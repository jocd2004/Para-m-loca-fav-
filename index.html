<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para mi loca fav 🩵</title>

<style>

/* ========================= */
/* FUENTE MINECRAFT */
/* ========================= */

@font-face{
font-family: 'Minecraft';
src: url('minecraft.ttf') format('truetype');
}

/* ========================= */
/* RESET */
/* ========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* ========================= */
/* FONDO REAL SEPARADO */
/* ========================= */

#background{
position:fixed;
width:100%;
height:100%;
background:url("fondo.jpg") no-repeat center center;
background-size:cover;
z-index:-2;
transition:filter 1.5s ease;
}

/* Blur SOLO al fondo */
#background.blur{
filter:blur(10px) brightness(0.5);
}

/* Oscurecer tipo cine */
#cinematic{
position:fixed;
width:100%;
height:100%;
background:black;
opacity:0;
z-index:-1;
transition:opacity 2s ease;
}

/* ========================= */
/* BODY */
/* ========================= */

body{
height:100vh;
overflow:hidden;
font-family:'Minecraft', monospace;
color:white;
}

/* ========================= */
/* PANTALLA INICIAL */
/* ========================= */

#startScreen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.3);
z-index:10;
}

#playBtn{
width:180px;
cursor:pointer;
transition:transform 0.2s ease;
}

#playBtn:hover{
transform:scale(1.1);
}

#playBtn:active{
transform:scale(0.9);
}

/* ========================= */
/* CONTENIDO */
/* ========================= */

#contenido{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
opacity:0;
transition:opacity 2s ease;
z-index:5;
}

h1{
font-size:28px;
color:#6ddcff;
text-shadow:4px 4px 0px #000;
margin-bottom:20px;
}

#mensaje{
font-size:20px;
max-width:90%;
margin-bottom:20px;
white-space:pre-line;
color:white;
text-shadow:3px 3px 0px #000;
min-height:100px;
}

#gif{
width:250px;
opacity:0;
transition:opacity 2s ease;
margin:20px 0;
}

#contador{
margin-top:20px;
font-size:18px;
text-shadow:3px 3px 0px #000;
}

.firma{
margin-top:20px;
font-size:22px;
color:#cccccc;
text-shadow:3px 3px 0px #000;
}

/* ========================= */
/* ABEJAS */
/* ========================= */

.bee{
position:absolute;
width:40px;
pointer-events:none;
transition:transform 0.1s linear;
}

/* ========================= */
/* PARTÍCULAS MÁGICAS */
/* ========================= */

.spark{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
pointer-events:none;
opacity:0.8;
animation:magic 2s linear infinite;
}

@keyframes magic{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100px);opacity:0;}
}

</style>
</head>

<body>

<div id="background"></div>
<div id="cinematic"></div>

<div id="startScreen">
<img src="play.png" id="playBtn">
</div>

<div id="contenido">
<h1>Para mi loca fav 🩵</h1>
<div id="mensaje"></div>
<img src="animacion.gif" id="gif">
<div id="contador"></div>
<p class="firma">Ley 🩶 Joc</p>
</div>

<audio id="musica" src="musica.mp3"></audio>
<audio id="clickSound" src="click.mp3"></audio>

<script>

/* ELEMENTOS */

const playBtn = document.getElementById("playBtn");
const musica = document.getElementById("musica");
const clickSound = document.getElementById("clickSound");
const startScreen = document.getElementById("startScreen");
const contenido = document.getElementById("contenido");
const mensaje = document.getElementById("mensaje");
const gif = document.getElementById("gif");
const contador = document.getElementById("contador");
const background = document.getElementById("background");
const cinematic = document.getElementById("cinematic");

/* TEXTO */

const texto =
"Aunque seas una loca, eres mi loca y la loca que amo.\n\n"+
"Te quiero mucho ❤️ y quiero que seas mi San Valentín toda mi vida.";

const fechaInicio = new Date("2020-05-30T00:00:00");

/* CLICK INICIAL */

playBtn.addEventListener("click",()=>{

clickSound.play();
navigator.vibrate(200);

cinematic.style.opacity="1";

setTimeout(()=>{
musica.play();
background.classList.add("blur");
startScreen.style.display="none";
contenido.style.opacity="1";
gif.style.opacity="1";
cinematic.style.opacity="0";
escribirTexto();
generarAbejas();
generarMagia();
},1500);

});

/* ESCRITURA */

function escribirTexto(){
let i=0;
function escribir(){
if(i<texto.length){
mensaje.innerHTML+=texto.charAt(i);
i++;
setTimeout(escribir,40);
}
}
escribir();
}

/* CONTADOR */

function actualizarContador(){
let ahora=new Date();
let diferencia=ahora-fechaInicio;

let dias=Math.floor(diferencia/(1000*60*60*24));
let horas=Math.floor((diferencia/(1000*60*60))%24);
let minutos=Math.floor((diferencia/(1000*60))%60);
let segundos=Math.floor((diferencia/1000)%60);

contador.innerHTML=
"Mi amor por ti comenzó hace:<br>"+
dias+" días "+horas+" horas "+
minutos+" minutos "+segundos+" segundos";
}

setInterval(actualizarContador,1000);
actualizarContador();

/* ABEJAS */

function generarAbejas(){
setInterval(()=>{
let bee=document.createElement("img");
bee.src="abeja.png";
bee.classList.add("bee");
bee.style.left=Math.random()*window.innerWidth+"px";
bee.style.top=window.innerHeight+"px";
document.body.appendChild(bee);

let subir=setInterval(()=>{
bee.style.top=bee.offsetTop-2+"px";
if(bee.offsetTop<-50){
bee.remove();
clearInterval(subir);
}
},20);

},2000);
}

/* ABEJAS SIGUEN CURSOR */

document.addEventListener("mousemove",(e)=>{
let bees=document.querySelectorAll(".bee");
bees.forEach(bee=>{
let dx=e.clientX-bee.offsetLeft;
let dy=e.clientY-bee.offsetTop;
bee.style.transform="translate("+dx*0.02+"px,"+dy*0.02+"px)";
});
});

/* MAGIA */

function generarMagia(){
setInterval(()=>{
let spark=document.createElement("div");
spark.classList.add("spark");
spark.style.left=Math.random()*window.innerWidth+"px";
spark.style.top=Math.random()*window.innerHeight+"px";
document.body.appendChild(spark);
setTimeout(()=>{spark.remove();},2000);
},300);
}

</script>

</body>
</html>
